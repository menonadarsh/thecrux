<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Social share card. Export to og.png (1200×630) for scrapers that don't
       render SVG (Twitter/X, iMessage). See img/README.md. -->
  <defs>
    <pattern id="grid" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#26262f"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="#0c0c0f"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect x="0" y="0" width="1200" height="6" fill="#f0b429"/>

  <text x="80" y="150" font-family="ui-monospace, Menlo, monospace" font-size="26"
        fill="#8c887e">// self-hosted, private git — on your own server</text>

  <text x="76" y="330" font-family="ui-monospace, Menlo, monospace" font-size="150"
        font-weight="800" letter-spacing="-6" fill="#e9e6df">thecrux<tspan fill="#f0b429">❯</tspan></text>

  <text x="80" y="420" font-family="ui-monospace, Menlo, monospace" font-size="44"
        font-weight="600" fill="#e9e6df">The crux is in the <tspan fill="#f0b429">code</tspan>.</text>

  <text x="80" y="490" font-family="ui-monospace, Menlo, monospace" font-size="27"
        fill="#8c887e">Keyboard-first. Private by default. Issues &amp; pull requests.</text>
  <text x="80" y="527" font-family="ui-monospace, Menlo, monospace" font-size="27"
        fill="#8c887e">Your code never leaves your server.</text>

  <g transform="translate(80,565)">
    <rect x="0" y="-24" width="150" height="34" rx="6" fill="#f0b429"/>
    <text x="75" y="-1" font-family="ui-monospace, Menlo, monospace" font-size="20"
          font-weight="700" text-anchor="middle" fill="#0c0c0f">Open source</text>
    <text x="172" y="-1" font-family="ui-monospace, Menlo, monospace" font-size="20"
          fill="#5a574f">MIT · Docker · github.com/menonadarsh/thecrux</text>
  </g>
</svg>
